# nginx: mount the app under a hard-to-guess subpath of your existing site.
# Add these two blocks INSIDE the existing `server { ... }` that already serves
# /var/www/html, then: sudo nginx -t && sudo systemctl reload nginx
#
# Replace abc123XYZ with your own random string, e.g.  openssl rand -hex 8

# Redirect the bare prefix (no trailing slash) to the slashed form.
location = /abc123XYZ/PDF_validator {
    return 301 /abc123XYZ/PDF_validator/;
}

location /abc123XYZ/PDF_validator/ {
    # Trailing slash on BOTH sides strips the prefix before forwarding,
    # so the app sees /, /analyze, /static/... at its own root.
    proxy_pass         http://127.0.0.1:8000/;

    proxy_set_header   Host               $host;
    proxy_set_header   X-Real-IP          $remote_addr;
    proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto  $scheme;
    # Tells Flask (via ProxyFix) its mount point, so url_for() and the JS
    # fetch() calls resolve under the subpath.
    proxy_set_header   X-Forwarded-Prefix /abc123XYZ/PDF_validator;

    # Must be >= MAX_CONTENT_LENGTH in webapp.py, or uploads 413 at nginx.
    client_max_body_size 50m;
}
